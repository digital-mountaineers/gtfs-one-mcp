name: Publish to npm

# Publishes the package to npm whenever a version tag (v1.2.3) is pushed.
# Requires an NPM_TOKEN repository secret (an npm automation/granular token with
# publish rights to gtfs-pro-mcp). Provenance attestations are generated via the
# GitHub OIDC token, so the repo must be public for them to be accepted.

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run build

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
