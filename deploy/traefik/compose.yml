# Deploy on a host that ALREADY runs Traefik (e.g. dm-1). No second proxy — the
# MCP container joins the existing external `proxy` network and Traefik routes to
# it via labels, matching the conventions of the other services on the box
# (entrypoint: websecure, certresolver: letsencrypt).
#
#   cd deploy/traefik
#   cp .env.example .env && nano .env     # set MCP_DOMAIN, GTFS_ONE_URL, agency
#   docker compose up -d --build
#
# Traefik picks up the new router automatically (Docker provider) and requests a
# cert via its letsencrypt resolver — no Traefik restart needed.

# Explicit project name so Compose never adopts the host's real "traefik" project.
# (The folder is deploy/traefik, which would otherwise default the project name to
# "traefik" and treat the real Traefik container as an orphan — a careless
# `docker compose down --remove-orphans` here could then delete your reverse proxy.)
name: gtfs-one-mcp

services:
  gtfs-one-mcp:
    build: ../..                 # repo-root Dockerfile (HTTP server)
    image: gtfs-one-mcp:local
    restart: unless-stopped
    environment:
      GTFS_ONE_URL: ${GTFS_ONE_URL}
      GTFS_ONE_AGENCY_NAME: ${GTFS_ONE_AGENCY_NAME}
      GTFS_ONE_FEED_ID: ${GTFS_ONE_FEED_ID:-default}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
      PORT: "3000"
    networks:
      - proxy
    labels:
      traefik.enable: "true"
      traefik.docker.network: "proxy"
      traefik.http.routers.gtfs-one-mcp.rule: "Host(`${MCP_DOMAIN}`)"
      traefik.http.routers.gtfs-one-mcp.entrypoints: "websecure"
      traefik.http.routers.gtfs-one-mcp.tls.certresolver: "letsencrypt"
      traefik.http.services.gtfs-one-mcp.loadbalancer.server.port: "3000"

networks:
  proxy:
    external: true
